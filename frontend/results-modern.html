<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/results-modern.css">
</head>
<body>
    <div class="results-container">
        <!-- Score Hero -->
        <div class="score-hero">
            <div class="score-label">Votre score</div>
            
            <div class="score-circle">
                <svg width="200" height="200">
                    <defs>
                        <linearGradient id="gradient-excellent" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#06d6a0;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00b894;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="gradient-good" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="gradient-average" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ffd166;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f4a261;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="gradient-poor" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ef476f;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle class="score-circle-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="score-circle-fill" id="scoreCircle" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="score-value" id="scorePercentage">0%</div>
            </div>
            
            <div class="score-text" id="scoreText">Chargement...</div>
            <div class="score-description" id="scoreDescription">-</div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon correct">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">Réponses correctes</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon incorrect">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="stat-value" id="incorrectCount">0</div>
                <div class="stat-label">Réponses incorrectes</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon time">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-value" id="timeSpent">0:00</div>
                <div class="stat-label">Temps passé</div>
            </div>
        </div>
        
        <!-- Review Section -->
        <div class="review-section">
            <div class="review-header">
                <h2><i class="fas fa-list-check me-2"></i>Révision des réponses</h2>
            </div>
            
            <div id="questionsReview"></div>
        </div>
        
        <!-- Action Buttons -->
        <div class="action-buttons">
            <a href="quiz.html" class="btn-modern btn-secondary-modern">
                <i class="fas fa-arrow-left"></i>
                Retour aux quiz
            </a>
            <a href="dashboard.html" class="btn-modern btn-primary-modern">
                <i class="fas fa-chart-line"></i>
                Voir mes statistiques
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/results-modern.js"></script>
</body>
</html>
