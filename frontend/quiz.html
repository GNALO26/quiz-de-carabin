<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #f8f9fa; }
        
        .quiz-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .quiz-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .quiz-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        
        .badge-free {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }
        
        .badge-premium {
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
            color: white;
        }
        
        .subject-section {
            margin-bottom: 3rem;
        }
        
        .subject-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #667eea;
        }
        
        .loader {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <img src="/assets/images/logo.png" alt="Quiz de Carabin" height="40" class="me-2">
                <span class="fw-bold text-primary">Quiz de Carabin</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/index.html"><i class="fas fa-home me-1"></i>Accueil</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/quiz.html"><i class="fas fa-gamepad me-1"></i>Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html"><i class="fas fa-info-circle me-1"></i>À propos</a></li>
                    
                    <li class="nav-item" id="nav-dashboard" style="display: none;">
                        <a class="nav-link" href="/dashboard-modern.html"><i class="fas fa-tachometer-alt me-1"></i>Dashboard</a>
                    </li>
                    
                    <li class="nav-item" id="nav-login">
                        <a class="btn btn-outline-primary ms-2" href="/login.html"><i class="fas fa-sign-in-alt me-1"></i>Se connecter</a>
                    </li>
                    <li class="nav-item" id="nav-register">
                        <a class="btn btn-primary ms-2" href="/register.html"><i class="fas fa-user-plus me-1"></i>S'inscrire</a>
                    </li>
                    
                    <li class="nav-item dropdown" id="nav-user" style="display: none;">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <img src="/assets/images/logo.png" alt="User" class="rounded-circle me-2" width="32" height="32">
                            <span id="user-name">Utilisateur</span>
                            <span id="user-premium-badge" class="badge bg-warning ms-2" style="display: none;">
                                <i class="fas fa-crown"></i> Premium
                            </span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/help.html"><i class="fas fa-question-circle me-2"></i>Aide</a></li>
                            <li><a class="dropdown-item" href="/stats.html"><i class="fas fa-chart-line me-2"></i>Statistiques</a></li>
                            <li><a class="dropdown-item" href="/history.html"><i class="fas fa-history me-2"></i>Historique</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="nav-logout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="quiz-container">
        <!-- Header -->
        <div class="quiz-header">
            <h1><i class="fas fa-gamepad me-2"></i>Choisissez votre Quiz</h1>
            <p class="mb-0">Testez vos connaissances médicales</p>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <p class="mt-3">Chargement des quiz...</p>
        </div>

        <!-- Liste des quiz (par matière) -->
        <div id="quiz-list" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://quiz-de-carabin-backend.onrender.com';
        
        document.addEventListener('DOMContentLoaded', function() {
            updateNavbar();
            loadQuizzes();
            
            document.getElementById('nav-logout')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.clear();
                window.location.href = '/index.html';
            });
        });
        
        function updateNavbar() {
            const token = localStorage.getItem('quizToken');
            const userStr = localStorage.getItem('quizUser');
            
            if (token && userStr && token !== 'null') {
                try {
                    const user = JSON.parse(userStr);
                    document.getElementById('nav-dashboard').style.display = 'block';
                    document.getElementById('nav-user').style.display = 'block';
                    document.getElementById('nav-login').style.display = 'none';
                    document.getElementById('nav-register').style.display = 'none';
                    document.getElementById('user-name').textContent = user.name || 'Utilisateur';
                    
                    if (user.isPremium) {
                        document.getElementById('user-premium-badge').style.display = 'inline-block';
                    }
                } catch (e) {}
            }
        }
        
        async function loadQuizzes() {
            try {
                const token = localStorage.getItem('quizToken');
                
                const headers = { 'Content-Type': 'application/json' };
                if (token && token !== 'null') {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                const response = await fetch(`${API_URL}/api/quiz`, { headers });
                
                if (!response.ok) throw new Error('Erreur chargement');
                
                const data = await response.json();
                displayQuizzes(data.quizzes || data.data || []);
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('loader').innerHTML = `
                    <div class="alert alert-danger">
                        Erreur lors du chargement des quiz
                    </div>
                `;
            }
        }
        
        function displayQuizzes(quizzes) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('quiz-list').style.display = 'block';
            
            if (quizzes.length === 0) {
                document.getElementById('quiz-list').innerHTML = `
                    <div class="alert alert-info">Aucun quiz disponible</div>
                `;
                return;
            }
            
            // Grouper par matière
            const bySubject = {};
            quizzes.forEach(quiz => {
                const subject = quiz.subject || 'Autres';
                if (!bySubject[subject]) bySubject[subject] = [];
                bySubject[subject].push(quiz);
            });
            
            // Afficher
            const listHTML = Object.keys(bySubject).sort().map(subject => {
                const subjectQuizzes = bySubject[subject];
                
                const quizzesHTML = subjectQuizzes.map(quiz => {
                    const isFree = quiz.free || false;
                    const userStr = localStorage.getItem('quizUser');
                    let isPremium = false;
                    
                    try {
                        if (userStr && userStr !== 'null') {
                            const user = JSON.parse(userStr);
                            isPremium = user.isPremium || false;
                        }
                    } catch (e) {}
                    
                    const hasAccess = isFree || isPremium;
                    
                    return `
                        <div class="quiz-card" onclick="startQuiz('${quiz._id}', ${!hasAccess && !isFree})">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0">${quiz.title}</h5>
                                <span class="badge ${isFree ? 'badge-free' : 'badge-premium'}">
                                    ${isFree ? 'GRATUIT' : 'PREMIUM'}
                                </span>
                            </div>
                            <p class="text-muted mb-2">${quiz.description || ''}</p>
                            <div class="d-flex justify-content-between text-muted small">
                                <span><i class="fas fa-question-circle me-1"></i>${quiz.questions?.length || 0} questions</span>
                                <span><i class="fas fa-clock me-1"></i>${quiz.duration || 10} min</span>
                            </div>
                            ${!hasAccess && !isFree ? '<div class="text-danger mt-2"><i class="fas fa-lock me-1"></i>Premium requis</div>' : ''}
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="subject-section">
                        <h2 class="subject-title">${subject}</h2>
                        ${quizzesHTML}
                    </div>
                `;
            }).join('');
            
            document.getElementById('quiz-list').innerHTML = listHTML;
        }
        
        function startQuiz(quizId, needsPremium) {
            if (needsPremium) {
                alert('Ce quiz nécessite un abonnement Premium');
                window.location.href = '/premium.html';
                return;
            }
            
            // ✅ REDIRECTION VERS quiz-modern.html avec l'ID du quiz
            window.location.href = `/quiz-modern.html?quizId=${quizId}`;
        }
    </script>
</body>
</html>
