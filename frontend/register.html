<html lang="fr">
<head>

<meta name="twitter:description" content="La plateforme interactive de quiz spécialement conçue pour les étudiants en médecine.">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            margin: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-control, .form-select {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
        }
        
        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 8px;
        }
        
        .password-requirements {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <h1>🎓 Quiz de Carabin</h1>
            <p>Créer votre compte</p>
        </div>
        
        <div id="alert" class="alert d-none"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Nom complet *</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" class="form-control" id="email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="phone">Téléphone</label>
                <input type="tel" class="form-control" id="phone" placeholder="+229...">
            </div>
            
            <div class="form-group">
                <label for="university">Université</label>
                <input type="text" class="form-control" id="university" placeholder="Ex: UNSTIM">
            </div>
            
            <div class="form-group">
                <label for="studyYear">Année d'étude</label>
                <select class="form-select" id="studyYear">
                    <option value="">Sélectionner</option>
                    <option value="1">1ère année</option>
                    <option value="2">2ème année</option>
                    <option value="3">3ème année</option>
                    <option value="4">4ème année</option>
                    <option value="5">5ème année</option>
                    <option value="6">6ème année</option>
                    <option value="7">7ème année</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" class="form-control" id="password" required autocomplete="new-password">
                <div class="password-requirements">
                    Minimum 6 caractères
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmer mot de passe *</label>
                <input type="password" class="form-control" id="confirmPassword" required autocomplete="new-password">
            </div>
            
            <button type="submit" id="registerBtn" class="btn-register">
                <i class="fas fa-user-plus me-2"></i>
                S'inscrire
            </button>
        </form>
        
        <div class="links">
            <p>Vous avez déjà un compte ? <a href="/login.html">Se connecter</a></p>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://quiz-de-carabin-backend.onrender.com';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const university = document.getElementById('university').value.trim();
            const studyYear = document.getElementById('studyYear').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const btn = document.getElementById('registerBtn');
            const alert = document.getElementById('alert');
            
            // Reset
            alert.classList.add('d-none');
            
            // Validation
            if (!name || !email || !password) {
                showError('Veuillez remplir tous les champs obligatoires');
                return;
            }
            
            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            // Désactiver bouton
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border"></span>Inscription...';
            
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        phone,
                        university,
                        studyYear: studyYear ? parseInt(studyYear) : undefined
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Sauvegarder token et user
                    localStorage.setItem('quizToken', data.token);
                    localStorage.setItem('quizUser', JSON.stringify(data.user));
                    
                    // Message succès
                    showSuccess('Compte créé avec succès ! Redirection...');
                    
                    // Redirection après 1.5s
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                    
                } else {
                    showError(data.message || 'Erreur lors de l\'inscription');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>S\'inscrire';
                }
                
            } catch (error) {
                console.error('Erreur register:', error);
                showError('Erreur de connexion. Vérifiez votre connexion internet.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>S\'inscrire';
            }
        });
        
        function showError(message) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-danger';
            alert.classList.remove('d-none');
        }
        
        function showSuccess(message) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-success';
            alert.classList.remove('d-none');
        }
        
        // Si déjà connecté, rediriger
        if (localStorage.getItem('quizToken')) {
            window.location.href = '/dashboard-modern.html';
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
