<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devenir Admin - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2 class="text-center mb-4">🔑 Devenir Administrateur</h2>
        
        <div class="alert alert-warning">
            <strong>⚠️ Attention :</strong> Cette page est réservée au propriétaire du site.
        </div>
        
        <form id="adminForm">
            <div class="mb-3">
                <label class="form-label">Votre Email</label>
                <input type="email" class="form-control" id="email" required 
                       placeholder="votre@email.com">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Clé Secrète</label>
                <input type="password" class="form-control" id="secretKey" required
                       placeholder="QUIZ_ADMIN_2024_SECRET">
            </div>
            
            <button type="submit" class="btn btn-primary w-100">
                Devenir Admin
            </button>
        </form>
        
        <div id="message" class="mt-3"></div>
    </div>

    <script>
        const API_URL = 'https://quiz-de-carabin-backend.onrender.com';
        
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const secretKey = document.getElementById('secretKey').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = '<div class="alert alert-info">Traitement...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/make-me-admin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, secretKey })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ Succès !</strong><br>
                            ${data.message}<br><br>
                            <a href="/admin-dashboard.html" class="btn btn-success">
                                Accéder au Dashboard Admin
                            </a>
                        </div>
                    `;
                    
                    // Mettre à jour localStorage si connecté
                    const userStr = localStorage.getItem('quizUser');
                    if (userStr) {
                        const user = JSON.parse(userStr);
                        user.isAdmin = true;
                        localStorage.setItem('quizUser', JSON.stringify(user));
                    }
                    
                } else {
                    messageDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <strong>❌ Erreur :</strong> ${data.message}
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                messageDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>❌ Erreur de connexion</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
