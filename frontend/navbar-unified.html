<script>
// ========================================
// GESTION NAVBAR DYNAMIQUE
// ========================================
document.addEventListener('DOMContentLoaded', function() {
    updateNavbar();
    
    // Logout handler
    document.getElementById('nav-logout')?.addEventListener('click', function(e) {
        e.preventDefault();
        
        // Clear storage
        localStorage.removeItem('quizToken');
        localStorage.removeItem('quizUser');
        localStorage.removeItem('userIsPremium');
        localStorage.removeItem('premiumExpiresAt');
        
        // Redirect
        window.location.href = '/index.html';
    });
});

function updateNavbar() {
    const token = localStorage.getItem('quizToken');
    const userStr = localStorage.getItem('quizUser');
    
    const navDashboard = document.getElementById('nav-dashboard');
    const navLogin = document.getElementById('nav-login');
    const navRegister = document.getElementById('nav-register');
    const navUser = document.getElementById('nav-user');
    const userName = document.getElementById('user-name');
    const premiumBadge = document.getElementById('user-premium-badge');
    
    if (token && userStr && token !== 'null' && userStr !== 'null') {
        // ✅ CONNECTÉ
        try {
            const user = JSON.parse(userStr);
            
            // Afficher
            navDashboard.style.display = 'block';
            navUser.style.display = 'block';
            
            // Cacher
            navLogin.style.display = 'none';
            navRegister.style.display = 'none';
            
            // Nom utilisateur
            userName.textContent = user.name || 'Utilisateur';
            
            // Badge Premium
            if (user.isPremium) {
                premiumBadge.style.display = 'inline-block';
            } else {
                premiumBadge.style.display = 'none';
            }
            
        } catch (e) {
            console.error('Erreur parse user:', e);
            showNotConnected();
        }
    } else {
        // ❌ NON CONNECTÉ
        showNotConnected();
    }
}

function showNotConnected() {
    document.getElementById('nav-dashboard').style.display = 'none';
    document.getElementById('nav-user').style.display = 'none';
    document.getElementById('nav-login').style.display = 'block';
    document.getElementById('nav-register').style.display = 'block';
}
</script>
