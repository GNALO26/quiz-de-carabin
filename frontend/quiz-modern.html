<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Moderne - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/quiz-modern.css">
</head>
<body>
    <!-- Navbar (identique à quiz.html) -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/images/logo.png" style="border-radius: 50%;" alt="Quiz de Carabin" height="42" class="d-inline-block align-text-top me-2">
                Quiz de Carabin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="quiz.html">Quiz</a>
                    </li>
                </ul>
                
                <div id="user-menu">
                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown">
                            <i class="fas fa-user me-1"></i> <span id="user-name">Utilisateur</span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
                            <li><a class="dropdown-item" href="history.html"><i class="fas fa-history me-2"></i>Historique</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Interface Quiz Moderne -->
    <div class="quiz-modern-container" id="quizInterface">
        <!-- Header -->
        <div class="quiz-header">
            <div class="quiz-title-section">
                <h1 id="quizTitle">Chargement...</h1>
                <div class="quiz-meta">
                    <span><i class="fas fa-book"></i> <span id="quizSubject">-</span></span>
                    <span><i class="fas fa-layer-group"></i> <span id="quizQuestionCount">0</span> questions</span>
                </div>
            </div>
            <div class="timer-modern" id="timer">
                <i class="fas fa-clock"></i>
                <span id="timerValue">00:00</span>
            </div>
        </div>
        
        <!-- Barre de progression -->
        <div class="progress-section">
            <div class="progress-info">
                <span>Question <strong id="currentQuestion">1</strong> sur <strong id="totalQuestions">0</strong></span>
                <span><strong id="progressPercentage">0</strong>% complété</span>
            </div>
            <div class="progress-bar-modern">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Question Card -->
        <div class="question-card" id="questionCard">
            <span class="question-number" id="questionNumber">Question 1</span>
            <div class="question-text" id="questionText">
                Chargement de la question...
            </div>
            
            <div class="options-container" id="optionsContainer">
                <!-- Options seront insérées ici dynamiquement -->
            </div>
            
            <!-- Justification -->
            <div class="justification-box" id="justificationBox">
                <div class="justification-title">
                    <i class="fas fa-lightbulb"></i>
                    Explication
                </div>
                <div class="justification-text" id="justificationText"></div>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="navigation-buttons">
            <button class="btn-modern btn-secondary-modern" id="prevBtn" disabled>
                <i class="fas fa-arrow-left"></i>
                Précédent
            </button>
            
            <button class="btn-modern btn-primary-modern" id="nextBtn">
                Suivant
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <button class="btn-modern btn-success-modern" id="submitBtn" style="display: none;">
                <i class="fas fa-check-circle"></i>
                Soumettre le quiz
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/quiz-modern.js"></script>
</body>
</html>
