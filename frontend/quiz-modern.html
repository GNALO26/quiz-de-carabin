<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Moderne - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/quiz-modern.css">
</head>
<script>
fetch('/navbar-complete.html')
    .then(res => res.text())
    .then(html => {
        const nav = document.createElement('div');
        nav.innerHTML = html;
        document.body.insertBefore(nav.firstElementChild, document.body.firstChild);
        
        // Réinitialiser les scripts de la navbar
        updateNavbar();
    });
</script>
<body>
    <!-- Navbar (identique à quiz.html) -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <!-- Logo avec image -->
        <a class="navbar-brand d-flex align-items-center" href="/index.html">
            <img src="/assets/images/logo.png" alt="Quiz de Carabin" height="40" class="me-2">
            <span class="fw-bold text-primary">Quiz de Carabin</span>
        </a>
        
        <!-- Toggle mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link active" href="/index.html">
                        Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/quiz-modern.html">
                        Quiz
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/about.html">
                        À propos
                    </a>
                </li>
                
                <!-- Dashboard (seulement si connecté) -->
                <li class="nav-item" id="nav-dashboard" style="display: none;">
                    <a class="nav-link" href="/dashboard-modern.html">
                        Dashboard
                    </a>
                </li>
                
                <!-- Boutons NON connecté -->
                <li class="nav-item" id="nav-login">
                    <a class="btn btn-outline-primary ms-2" href="/login.html">
                        <i class="fas fa-sign-in-alt me-1"></i>Se connecter
                    </a>
                </li>
                <li class="nav-item" id="nav-register">
                    <a class="btn btn-primary ms-2" href="/register.html">
                        <i class="fas fa-user-plus me-1"></i>S'inscrire
                    </a>
                </li>
                
                <!-- Menu utilisateur connecté -->
                <li class="nav-item dropdown" id="nav-user" style="display: none;">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" 
                       id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <img src="/assets/images/logo.png" alt="User" class="rounded-circle me-2" 
                             width="32" height="32">
                        <span id="user-name">Utilisateur</span>
                        <span id="user-premium-badge" class="badge bg-warning ms-2" style="display: none;">
                            <i class="fas fa-crown"></i> Premium
                        </span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="/dashboard-modern.html">
                                Mon Dashboard
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="/premium.html">
                                <i class="fas fa-crown me-2"></i>Premium
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item text-danger" href="#" id="nav-logout">
                                <i class="fas fa-sign-out-alt me-2"></i>Déconnexion
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Avant </body> -->
<script>
// Navbar dynamique
document.addEventListener('DOMContentLoaded', function() {
    updateNavbar();
    
    document.getElementById('nav-logout')?.addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('quizToken');
        localStorage.removeItem('quizUser');
        localStorage.removeItem('userIsPremium');
        localStorage.removeItem('premiumExpiresAt');
        window.location.href = '/index.html';
    });
});

function updateNavbar() {
    const token = localStorage.getItem('quizToken');
    const userStr = localStorage.getItem('quizUser');
    
    if (token && userStr && token !== 'null' && userStr !== 'null') {
        try {
            const user = JSON.parse(userStr);
            
            document.getElementById('nav-dashboard').style.display = 'block';
            document.getElementById('nav-user').style.display = 'block';
            document.getElementById('nav-login').style.display = 'none';
            document.getElementById('nav-register').style.display = 'none';
            
            document.getElementById('user-name').textContent = user.name || 'Utilisateur';
            
            if (user.isPremium) {
                document.getElementById('user-premium-badge').style.display = 'inline-block';
            }
        } catch (e) {
            console.error('Erreur:', e);
        }
    }
}
</script>

    <!-- Interface Quiz Moderne -->
    <div class="quiz-modern-container" id="quizInterface">
        <!-- Header -->
        <div class="quiz-header">
            <div class="quiz-title-section">
                <h1 id="quizTitle">Chargement...</h1>
                <div class="quiz-meta">
                    <span><i class="fas fa-book"></i> <span id="quizSubject">-</span></span>
                    <span><i class="fas fa-layer-group"></i> <span id="quizQuestionCount">0</span> questions</span>
                </div>
            </div>
            <div class="timer-modern" id="timer">
                <i class="fas fa-clock"></i>
                <span id="timerValue">00:00</span>
            </div>
        </div>
        
        <!-- Barre de progression -->
        <div class="progress-section">
            <div class="progress-info">
                <span>Question <strong id="currentQuestion">1</strong> sur <strong id="totalQuestions">0</strong></span>
                <span><strong id="progressPercentage">0</strong>% complété</span>
            </div>
            <div class="progress-bar-modern">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Question Card -->
        <div class="question-card" id="questionCard">
            <span class="question-number" id="questionNumber">Question 1</span>
            <div class="question-text" id="questionText">
                Chargement de la question...
            </div>
            
            <div class="options-container" id="optionsContainer">
                <!-- Options seront insérées ici dynamiquement -->
            </div>
            
            <!-- Justification -->
            <div class="justification-box" id="justificationBox">
                <div class="justification-title">
                    <i class="fas fa-lightbulb"></i>
                    Explication
                </div>
                <div class="justification-text" id="justificationText"></div>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="navigation-buttons">
            <button class="btn-modern btn-secondary-modern" id="prevBtn" disabled>
                <i class="fas fa-arrow-left"></i>
                Précédent
            </button>
            
            <button class="btn-modern btn-primary-modern" id="nextBtn">
                Suivant
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <button class="btn-modern btn-success-modern" id="submitBtn" style="display: none;">
                <i class="fas fa-check-circle"></i>
                Soumettre le quiz
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/quiz-modern.js"></script>
</body>
</html>
