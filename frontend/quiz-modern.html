<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Quiz de Carabin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background: #f8f9fa; }
        
        .quiz-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .quiz-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e9ecef;
        }
        
        .timer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .question-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 1.5rem;
        }
        
        .option-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        
        .option-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }
        
        .option-item.selected {
            border-color: #667eea;
            background: #f8f9ff;
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }
        
        .option-item.correct {
            border-color: #00b894;
            background: #e8f8f5;
        }
        
        .option-item.incorrect {
            border-color: #d63031;
            background: #ffe8e8;
        }
        
        .option-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 1rem;
            cursor: pointer;
        }
        
        .results-container {
            background: white;
            border-radius: 15px;
            padding: 3rem 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            margin: 2rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .score-circle.medium {
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
        }
        
        .score-circle.low {
            background: linear-gradient(135deg, #d63031 0%, #e84393 100%);
        }
        
        .review-question {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .btn-custom {
            padding: 0.75rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .loader {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <img src="/assets/images/logo.png" alt="Quiz de Carabin" height="40" class="me-2">
                <span class="fw-bold text-primary">Quiz de Carabin</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/quiz.html">Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html">À propos</a></li>
                    
                    <li class="nav-item" id="nav-dashboard" style="display: none;">
                        <a class="nav-link" href="/dashboard-modern.html">Dashboard</a>
                    </li>
                    
                    <li class="nav-item" id="nav-login">
                        <a class="btn btn-outline-primary ms-2" href="/login.html">
                            <i class="fas fa-sign-in-alt me-1"></i>Se connecter
                        </a>
                    </li>
                    <li class="nav-item" id="nav-register">
                        <a class="btn btn-primary ms-2" href="/register.html">
                            <i class="fas fa-user-plus me-1"></i>S'inscrire
                        </a>
                    </li>
                    
                    <li class="nav-item dropdown" id="nav-user" style="display: none;">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" 
                           id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <span id="user-name">Utilisateur</span>
                            <span id="user-premium-badge" class="badge bg-warning ms-2" style="display: none;">
                                <i class="fas fa-crown"></i> Premium
                            </span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/help.html"><i class="fas fa-question-circle me-2"></i>Aide</a></li>
                            <li><a class="dropdown-item" href="/stats.html"><i class="fas fa-chart-line me-2"></i>Statistiques</a></li>
                            <li><a class="dropdown-item" href="/history.html"><i class="fas fa-history me-2"></i>Historique</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="nav-logout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="quiz-container">
        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <p class="mt-3">Chargement du quiz...</p>
        </div>

        <!-- Interface Quiz -->
        <div id="quiz-interface" style="display: none;">
            <div class="quiz-card">
                <div class="quiz-header">
                    <h3 id="quiz-title">Titre du Quiz</h3>
                    <div class="timer" id="quiz-timer">20:00</div>
                </div>
                
                <div class="progress mb-4" style="height: 10px;">
                    <div id="quiz-progress" class="progress-bar" role="progressbar" 
                         style="width: 0%"></div>
                </div>
                
                <div id="question-container"></div>
                
                <div class="d-flex justify-content-between mt-4">
                    <button class="btn btn-secondary btn-custom" id="prev-btn" disabled>
                        <i class="fas fa-arrow-left me-2"></i>Précédent
                    </button>
                    <button class="btn btn-primary btn-custom" id="next-btn">
                        Suivant<i class="fas fa-arrow-right ms-2"></i>
                    </button>
                    <button class="btn btn-success btn-custom" id="submit-quiz" style="display: none;">
                        <i class="fas fa-check-circle me-2"></i>Terminer
                    </button>
                </div>
            </div>
        </div>

        <!-- Résultats -->
        <div id="results-container" style="display: none;">
            <div class="results-container">
                <h2 class="mb-4">Résultats du Quiz</h2>
                
                <div class="score-circle" id="score-circle">
                    <span id="score-value">0</span>%
                </div>
                
                <h4 id="score-text">Bravo !</h4>
                <p class="text-muted mb-4" id="score-description">Vous avez bien répondu</p>
                
                <div id="results-content" class="mt-4"></div>
                
                <div class="mt-4">
                    <button class="btn btn-outline-primary btn-custom me-2" id="review-btn">
                        <i class="fas fa-list me-2"></i>Revoir les réponses
                    </button>
                    <button class="btn btn-primary btn-custom" onclick="window.location.href='/quiz.html'">
                        <i class="fas fa-arrow-left me-2"></i>Retour aux quiz
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://quiz-de-carabin-backend.onrender.com';
        
        let currentQuiz = null;
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let timerInterval = null;
        let timeLeft = 0;
        
        document.addEventListener('DOMContentLoaded', function() {
            updateNavbar();
            
            // Lire quizId depuis l'URL
            const urlParams = new URLSearchParams(window.location.search);
            const quizId = urlParams.get('quizId');
            
            if (quizId) {
                loadQuiz(quizId);
            } else {
                // Pas de quizId → Retour liste
                window.location.href = '/quiz.html';
            }
            
            // Event listeners
            document.getElementById('nav-logout')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.clear();
                window.location.href = '/index.html';
            });
            
            document.getElementById('prev-btn').addEventListener('click', prevQuestion);
            document.getElementById('next-btn').addEventListener('click', nextQuestion);
            document.getElementById('submit-quiz').addEventListener('click', submitQuiz);
            document.getElementById('review-btn').addEventListener('click', () => showQuestion(0));
        });
        
        function updateNavbar() {
            const token = localStorage.getItem('quizToken');
            const userStr = localStorage.getItem('quizUser');
            
            if (token && userStr && token !== 'null') {
                try {
                    const user = JSON.parse(userStr);
                    document.getElementById('nav-dashboard').style.display = 'block';
                    document.getElementById('nav-user').style.display = 'block';
                    document.getElementById('nav-login').style.display = 'none';
                    document.getElementById('nav-register').style.display = 'none';
                    document.getElementById('user-name').textContent = user.name || 'Utilisateur';
                    
                    if (user.isPremium) {
                        document.getElementById('user-premium-badge').style.display = 'inline-block';
                    }
                } catch (e) {}
            }
        }
        
        async function loadQuiz(quizId) {
            try {
                const token = localStorage.getItem('quizToken');
                
                if (!token) {
                    alert('Vous devez vous connecter pour accéder aux quiz');
                    window.location.href = '/login.html';
                    return;
                }
                
                const response = await fetch(`${API_URL}/api/quiz/${quizId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.status === 403) {
                    alert('Ce quiz nécessite un abonnement Premium');
                    window.location.href = '/premium.html';
                    return;
                }
                
                if (!response.ok) throw new Error('Erreur chargement quiz');
                
                const data = await response.json();
                currentQuiz = data.quiz || data.data;
                userAnswers = new Array(currentQuiz.questions.length).fill().map(() => []);
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('quiz-interface').style.display = 'block';
                
                document.getElementById('quiz-title').textContent = currentQuiz.title;
                showQuestion(0);
                startTimer((currentQuiz.duration || 20) * 60);
                
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('loader').innerHTML = `
                    <div class="alert alert-danger">
                        Erreur lors du chargement du quiz
                        <br><a href="/quiz.html" class="btn btn-primary mt-3">Retour aux quiz</a>
                    </div>
                `;
            }
        }
        
        function showQuestion(index) {
            if (!currentQuiz || index < 0 || index >= currentQuiz.questions.length) return;
            
            const question = currentQuiz.questions[index];
            currentQuestionIndex = index;
            
            let optionsHTML = '';
            question.options.forEach((option, i) => {
                const isSelected = userAnswers[index].includes(i);
                optionsHTML += `
                    <div class="option-item ${isSelected ? 'selected' : ''}" onclick="toggleOption(${i})">
                        <input type="checkbox" class="option-checkbox" ${isSelected ? 'checked' : ''} 
                               onchange="toggleOption(${i})">
                        <span>${option.text}</span>
                    </div>
                `;
            });
            
            document.getElementById('question-container').innerHTML = `
                <div class="question-card">
                    <div class="question-text">
                        Question ${index + 1}/${currentQuiz.questions.length}: ${question.text}
                    </div>
                    ${optionsHTML}
                </div>
            `;
            
            // Navigation
            document.getElementById('prev-btn').disabled = index === 0;
            
            if (index < currentQuiz.questions.length - 1) {
                document.getElementById('next-btn').style.display = 'inline-block';
                document.getElementById('submit-quiz').style.display = 'none';
            } else {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('submit-quiz').style.display = 'inline-block';
            }
            
            // Progress
            const progress = ((index + 1) / currentQuiz.questions.length) * 100;
            document.getElementById('quiz-progress').style.width = `${progress}%`;
        }
        
        function toggleOption(optionIndex) {
            const currentAnswers = userAnswers[currentQuestionIndex];
            const idx = currentAnswers.indexOf(optionIndex);
            
            if (idx === -1) {
                currentAnswers.push(optionIndex);
            } else {
                currentAnswers.splice(idx, 1);
            }
            
            showQuestion(currentQuestionIndex);
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < currentQuiz.questions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }
        
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }
        
        function startTimer(seconds) {
            timeLeft = seconds;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('Temps écoulé ! Le quiz sera soumis automatiquement.');
                    submitQuiz();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('quiz-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        async function submitQuiz() {
            clearInterval(timerInterval);
            
            try {
                const token = localStorage.getItem('quizToken');
                
                const response = await fetch(`${API_URL}/api/quiz/${currentQuiz._id}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        answers: userAnswers,
                        timeSpent: (currentQuiz.duration * 60) - timeLeft
                    })
                });
                
                if (!response.ok) throw new Error('Erreur soumission');
                
                const data = await response.json();
                displayResults(data);
                
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de la soumission du quiz');
            }
        }
        
        function displayResults(data) {
            document.getElementById('quiz-interface').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            
            const scorePercent = Math.round((data.score / data.totalQuestions) * 100);
            document.getElementById('score-value').textContent = scorePercent;
            
            // Couleur selon score
            const scoreCircle = document.getElementById('score-circle');
            if (scorePercent >= 70) {
                scoreCircle.className = 'score-circle';
                document.getElementById('score-text').textContent = 'Excellent !';
                document.getElementById('score-description').textContent = 'Vous maîtrisez parfaitement ce sujet';
            } else if (scorePercent >= 50) {
                scoreCircle.className = 'score-circle medium';
                document.getElementById('score-text').textContent = 'Bon travail !';
                document.getElementById('score-description').textContent = 'Vous avez une bonne compréhension';
            } else {
                scoreCircle.className = 'score-circle low';
                document.getElementById('score-text').textContent = 'À améliorer';
                document.getElementById('score-description').textContent = 'Continuez à étudier';
            }
            
            // Afficher révision
            let reviewHTML = '';
            currentQuiz.questions.forEach((question, index) => {
                const userAnswer = userAnswers[index] || [];
                const correctAnswers = question.correctAnswers;
                const isCorrect = userAnswer.length === correctAnswers.length && 
                                  userAnswer.every(val => correctAnswers.includes(val));
                
                reviewHTML += `
                    <div class="review-question">
                        <h6>Question ${index + 1}: ${question.text}</h6>
                        <p class="${isCorrect ? 'text-success' : 'text-danger'}">
                            <strong>Vos réponses :</strong> 
                            ${userAnswer.length > 0 ? userAnswer.map(idx => question.options[idx].text).join(', ') : 'Aucune réponse'}
                            ${isCorrect ? '<i class="fas fa-check ms-2"></i>' : '<i class="fas fa-times ms-2"></i>'}
                        </p>
                        ${!isCorrect ? `
                            <p class="text-success">
                                <strong>Réponses correctes :</strong> 
                                ${correctAnswers.map(idx => question.options[idx].text).join(', ')}
                            </p>
                        ` : ''}
                        <div class="mt-2 border-top pt-2">
                            <strong>Explication :</strong> ${question.justification}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('results-content').innerHTML = reviewHTML;
        }
    </script>
</body>
</html>
